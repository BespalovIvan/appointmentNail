<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Nail Service</title>
</head>
<body>
<h1 th:text="${message}"></h1>
<p>Система записи для мастера маникюра готова к работе.</p>
<div sec:authorize="isAnonymous()">
    <a href="/login"><button>Войти в систему</button></a>
</div>

<div sec:authorize="isAuthenticated()">
    <a href="/make-appointment"><button>Записаться</button></a>
    <a href="/appointments"><button>Список всех записей</button></a>

    <form th:action="@{/logout}" method="post" style="display:inline">
        <button type="submit">Выйти</button>
    </form>
</div>

<div sec:authorize="hasRole('ADMIN')">
    <a href="/add-master"><button>Добавить нового мастера</button></a>
    <a href="/add-procedure"><button>Добавить новую услугу</button></a>
</div>
</body>
</html>
