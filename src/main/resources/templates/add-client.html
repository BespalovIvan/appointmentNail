<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Новый клиент</title>
</head>
<body>
<h2>Регистрация нового клиента</h2>
<form th:action="@{/add-client}" th:object="${clientDto}" method="post">
    <label>Имя:</label>
    <input type="text" th:field="*{firstName}" required /><br/>

    <label>Фамилия:</label>
    <input type="text" th:field="*{lastName}" required /><br/>

    <label>Телефон:</label>
    <input type="text" th:field="*{phoneNumber}" required /><br/>

    <button type="submit">Сохранить</button>
</form>
<br/>
<a href="/">Назад</a>
</body>
</html>
